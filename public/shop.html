<!DOCTYPE html>
<html lang="fr" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shop - Student Wallet</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/css/theme.css">
</head>

<body class="page-shop">
    <div class="orb-canvas" aria-hidden="true">
        <div class="orb orb-a"></div>
        <div class="orb orb-b"></div>
        <div class="orb orb-c"></div>
    </div>

    <div class="app-shell">
        <div class="page-content">
            <h1 class="text-2xl font-bold text-center">Boutique</h1>
            <p class="text-center text-sm opacity-50 mb-4">Achète des crédits pour ton association</p>

            <div class="flex flex-col gap-4">
                <!-- Pack 1 -->
                <div class="shop-tile">
                    <div class="icon-wrap">
                        <i data-lucide="sparkles" class="w-6 h-6 text-amber-400"></i>
                    </div>
                    <h3>Pack Découverte</h3>
                    <p class="price">2.00 €</p>
                    <p class="credits">20 Crédits</p>
                    <button class="btn btn-primary w-full btn-buy-product" data-product-id="pack_10">Acheter</button>
                </div>

                <!-- Pack 2 -->
                <div class="shop-tile featured">
                    <div class="icon-wrap">
                        <i data-lucide="rocket" class="w-6 h-6 text-blue-400"></i>
                    </div>
                    <h3>Pack Standard</h3>
                    <p class="price">5.00 €</p>
                    <p class="credits">50 Crédits</p>
                    <button class="btn btn-primary w-full btn-buy-product" data-product-id="pack_50">Acheter</button>
                </div>

                <!-- Pack 3 -->
                <div class="shop-tile">
                    <div class="icon-wrap">
                        <i data-lucide="gem" class="w-6 h-6 text-violet-400"></i>
                    </div>
                    <h3>Pack Premium</h3>
                    <p class="price">10.00 €</p>
                    <p class="credits">100 Crédits</p>
                    <button class="btn btn-primary w-full btn-buy-product" data-product-id="pack_100">Acheter</button>
                </div>
            </div>
        </div>

        <!-- Bottom Nav -->
        <nav class="bottom-bar">
            <a href="/shop.html" class="active">
                <i data-lucide="shopping-bag"></i>
                <span>Shop</span>
            </a>
            <a href="/events.html">
                <i data-lucide="calendar"></i>
                <span>Events</span>
            </a>
            <a href="/">
                <i data-lucide="credit-card"></i>
                <span>Carte</span>
            </a>
            <a href="/profile.html">
                <i data-lucide="user"></i>
                <span>Profil</span>
            </a>
        </nav>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="/js/app.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
