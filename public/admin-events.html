<!DOCTYPE html>
<html lang="fr" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - BDE Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/css/theme.css">
</head>

<body class="page-admin">
    <div class="orb-canvas" aria-hidden="true">
        <div class="orb orb-a"></div>
        <div class="orb orb-b"></div>
        <div class="orb orb-c"></div>
    </div>

    <!-- Top Nav (desktop) -->
    <nav class="top-nav">
        <a href="/admin.html" class="brand">Student Wallet <span class="opacity-50 text-sm">Admin</span></a>
        <div class="nav-links">
            <a href="/admin.html">Dashboard</a>
            <a href="/admin-students.html">Étudiants</a>
            <a href="/admin-events.html" class="active">Events</a>
            <a href="/admin-finances.html">Finances</a>
            <a href="/profile.html">Profil</a>
        </div>
        <div class="flex items-center gap-3">
            <a href="/profile.html" class="btn btn-ghost btn-sm btn-circle">
                <i data-lucide="user" class="w-5 h-5"></i>
            </a>
        </div>
    </nav>

    <div class="app-shell">
        <div class="page-content">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">Événements</h2>
                <a href="/admin.html" class="btn btn-ghost btn-sm">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                    Dashboard
                </a>
            </div>

            <div class="glass-card mb-4">
                <h3 class="font-semibold mb-3 flex items-center gap-2">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i>
                    Nouveau
                </h3>
                <div class="flex flex-col gap-2">
                    <input type="text" id="evtTitle" placeholder="Titre"
                        class="input input-bordered input-sm w-full bg-white/5 border-white/10">
                    <div class="flex gap-2">
                        <input type="date" id="evtDate"
                            class="input input-bordered input-sm flex-1 bg-white/5 border-white/10">
                        <input type="number" id="evtPoints" placeholder="Pts"
                            class="input input-bordered input-sm w-20 bg-white/5 border-white/10">
                    </div>
                    <button id="createEventBtn" class="btn btn-primary btn-sm w-full">Créer événement</button>
                </div>
            </div>

            <div class="glass-card">
                <h3 class="font-semibold mb-3 flex items-center gap-2">
                    <i data-lucide="list" class="w-5 h-5"></i>
                    Liste
                </h3>
                <div id="adminEventsList"></div>
            </div>
        </div>

        <nav class="bottom-bar">
            <a href="/admin.html">
                <i data-lucide="layout-dashboard"></i>
                <span>Dashboard</span>
            </a>
            <a href="/admin-students.html">
                <i data-lucide="users"></i>
                <span>Étudiants</span>
            </a>
            <a href="/admin-events.html" class="active">
                <i data-lucide="calendar"></i>
                <span>Events</span>
            </a>
            <a href="/admin-finances.html">
                <i data-lucide="wallet"></i>
                <span>Finances</span>
            </a>
            <a href="/profile.html">
                <i data-lucide="user"></i>
                <span>Profil</span>
            </a>
        </nav>
    </div>

    <!-- Participants Modal -->
    <div id="participantsModal" class="modal-overlay hidden">
        <div class="modal-box">
            <h3 class="font-bold text-lg mb-3">Participations</h3>
            <div id="participantsListCtx" style="max-height: 300px; overflow-y: auto;"></div>
            <button id="closeParticipantsModalBtn" class="btn btn-ghost w-full mt-3">Fermer</button>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="js/admin.js"></script>
    <script src="js/app.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
