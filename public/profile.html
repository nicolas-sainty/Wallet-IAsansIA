<!DOCTYPE html>
<html lang="fr" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profile - Student Wallet</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/css/theme.css">
</head>

<body class="page-profile">
    <div class="orb-canvas" aria-hidden="true">
        <div class="orb orb-a"></div>
        <div class="orb orb-b"></div>
        <div class="orb orb-c"></div>
    </div>

    <div class="app-shell">
        <div class="page-content">
            <!-- Profile Header -->
            <div class="glass-card text-center">
                <div class="w-20 h-20 rounded-full bg-gradient-to-br from-amber-500 to-orange-600 flex items-center justify-center text-2xl font-bold text-white mx-auto mb-3">
                    <span id="profileInitials">?</span>
                </div>
                <h2 id="profileName" class="text-xl font-bold">Chargement...</h2>
                <p id="profileEmail" class="text-sm opacity-50 mt-1">...</p>
                <div id="profileRole" class="badge badge-ghost mt-2">STUDENT</div>
            </div>

            <!-- BDE Information -->
            <div class="glass-card">
                <h3 class="font-semibold mb-3 flex items-center gap-2">
                    <i data-lucide="graduation-cap" class="w-5 h-5"></i>
                    Mon BDE
                </h3>
                <div class="text-center py-3">
                    <p id="profileBdeName" class="text-lg font-semibold" style="color: var(--accent);">Chargement...</p>
                    <small class="opacity-40">Bureau des Étudiants</small>
                </div>
            </div>

            <!-- Payment Requests -->
            <div class="glass-card" id="requestsPanel" style="display:none;">
                <h3 class="font-semibold mb-3 flex items-center gap-2" style="color: var(--accent);">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                    Demandes de Paiement
                </h3>
                <div id="pendingRequestsList">
                    <small class="opacity-40">Aucune demande.</small>
                </div>
            </div>

            <!-- Settings -->
            <div class="glass-card">
                <h3 class="font-semibold mb-3 flex items-center gap-2">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                    Paramètres
                </h3>
                <div class="flex justify-between items-center py-2 border-b border-white/5">
                    <span>Notifications</span>
                    <input type="checkbox" class="toggle toggle-sm toggle-primary" checked>
                </div>
                <div class="flex justify-between items-center py-2 border-b border-white/5">
                    <span>Thème</span>
                    <button id="themeToggle" class="btn btn-ghost btn-sm btn-circle">
                        <i data-lucide="moon" class="w-4 h-4"></i>
                    </button>
                </div>
                <div class="mt-4">
                    <button id="logoutBtn" class="btn btn-outline btn-error w-full btn-sm">
                        <i data-lucide="log-out" class="w-4 h-4"></i>
                        Se Déconnecter
                    </button>
                </div>
            </div>
        </div>

        <!-- Bottom Nav -->
        <nav class="bottom-bar">
            <a href="/shop.html">
                <i data-lucide="shopping-bag"></i>
                <span>Shop</span>
            </a>
            <a href="/events.html">
                <i data-lucide="calendar"></i>
                <span>Events</span>
            </a>
            <a href="/">
                <i data-lucide="credit-card"></i>
                <span>Carte</span>
            </a>
            <a href="/profile.html" class="active">
                <i data-lucide="user"></i>
                <span>Profil</span>
            </a>
        </nav>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            try {
                const keys = new Set(['token', 'user']);
                const ls = window.localStorage;
                const originalGetItem = ls.getItem.bind(ls);
                const originalSetItem = ls.setItem.bind(ls);
                const originalRemoveItem = ls.removeItem.bind(ls);

                ls.getItem = function (key) {
                    if (keys.has(key)) return sessionStorage.getItem(key);
                    return originalGetItem(key);
                };
                ls.setItem = function (key, value) {
                    if (keys.has(key)) return sessionStorage.setItem(key, value);
                    return originalSetItem(key, value);
                };
                ls.removeItem = function (key) {
                    if (keys.has(key)) return sessionStorage.removeItem(key);
                    return originalRemoveItem(key);
                };
            } catch (e) { }

            let user = JSON.parse(localStorage.getItem('user'));

            if (user && user.role === 'bde_admin' && !user.bde_id) {
                try {
                    const meRes = await fetch('/api/auth/me', {
                        headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                    });
                    if (meRes.ok) {
                        const meData = await meRes.json();
                        if (meData && meData.user_id) {
                            user = { ...user, ...meData };
                            localStorage.setItem('user', JSON.stringify(user));
                        }
                    }
                } catch (e) { }
            }

            if (user) {
                document.getElementById('profileName').textContent = user.full_name || user.email;
                document.getElementById('profileEmail').textContent = user.email;
                document.getElementById('profileInitials').textContent = (user.full_name || user.email).charAt(0).toUpperCase();
                document.getElementById('profileRole').textContent = user.role === 'student' ? 'ETUDIANT' : 'BDE / ADMIN';

                if (user.bde_id) {
                    try {
                        const response = await fetch(`/api/groups/${user.bde_id}`);
                        const result = await response.json();
                        document.getElementById('profileBdeName').textContent = result.data?.group_name || 'Mon BDE';
                    } catch (e) {
                        document.getElementById('profileBdeName').textContent = 'BDE';
                    }
                } else {
                    document.getElementById('profileBdeName').textContent = 'Aucun BDE assigné';
                }
            }

            // Load Payment Requests
            try {
                const res = await fetch('/api/payment/requests', {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const requests = (await res.json()).data;

                const reqContainer = document.getElementById('requestsPanel');
                if (requests && requests.length > 0) {
                    reqContainer.style.display = 'block';
                    const list = document.getElementById('pendingRequestsList');
                    list.innerHTML = requests.map(r => `
                        <div class="glass-card mb-2" style="background: rgba(255,140,66,0.06); border-color: rgba(255,140,66,0.2);">
                            <div class="flex justify-between items-center mb-1">
                                <strong>${r.group_name}</strong>
                                <span class="badge badge-error badge-sm">${r.amount} Pts</span>
                            </div>
                            <small class="opacity-50">${r.description}</small>
                            <div class="flex gap-2 mt-2">
                                <button class="btn btn-primary btn-xs flex-1" onclick="respondRequest('${r.request_id}', 'PAY')">Payer</button>
                                <button class="btn btn-ghost btn-xs flex-1" onclick="respondRequest('${r.request_id}', 'REJECT')">Refuser</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    reqContainer.style.display = 'none';
                }
            } catch (e) { }

            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) logoutBtn.addEventListener('click', logout);

            lucide.createIcons();
        });

        window.logout = async function () {
            try { await fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' }); } catch (e) { }
            try { sessionStorage.removeItem('token'); } catch (e) { }
            try { sessionStorage.removeItem('user'); } catch (e) { }
            try { localStorage.removeItem('token'); } catch (e) { }
            try { localStorage.removeItem('user'); } catch (e) { }
            window.location.href = '/login.html';
        }

        window.respondRequest = async function (reqId, action) {
            if (!confirm(action === 'PAY' ? "Confirmer le paiement ?" : "Refuser la demande ?")) return;
            try {
                const res = await fetch(`/api/payment/requests/${reqId}/respond`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: JSON.stringify({ action })
                });
                if (res.ok) { alert("Action effectuée !"); window.location.reload(); }
                else { const err = await res.json(); alert("Erreur: " + err.error); }
            } catch (e) { alert("Erreur réseau"); }
        }
    </script>
    <script src="js/app.js"></script>
</body>

</html>
