<!DOCTYPE html>
<html lang="fr" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement Réussi</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/css/theme.css">
</head>

<body class="page-shop">
    <div class="orb-canvas" aria-hidden="true">
        <div class="orb orb-a"></div>
        <div class="orb orb-b"></div>
        <div class="orb orb-c"></div>
    </div>

    <div class="flex justify-center items-center min-h-screen px-4 relative z-1">
        <div class="glass-card text-center max-w-sm w-full">
            <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-green-500/20 flex items-center justify-center">
                <i data-lucide="party-popper" class="w-8 h-8 text-green-400"></i>
            </div>
            <h1 id="status-title" class="text-xl font-bold mb-2">Vérification...</h1>
            <p id="status-message" class="text-sm opacity-60 mb-4">Veuillez patienter pendant que nous validons votre paiement.</p>
            <a href="/" class="btn btn-primary" id="home-btn" style="display: none;">
                <i data-lucide="home" class="w-4 h-4"></i>
                Retour à l'accueil
            </a>
        </div>
    </div>

    <script>
        if (window.lucide && typeof window.lucide.createIcons === 'function') {
            window.lucide.createIcons();
        }

        function setStatus(title, message) {
            document.getElementById('status-title').textContent = title;
            document.getElementById('status-message').textContent = message;
        }

        async function verifyPayment() {
            const urlParams = new URLSearchParams(window.location.search);
            const sessionId = urlParams.get('session_id');

            if (!sessionId) {
                setStatus('Erreur', 'Session ID manquant.');
                document.getElementById('home-btn').style.display = 'inline-flex';
                return;
            }

            const maxAttempts = 8;
            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
                try {
                    const res = await fetch('/api/payment/verify-session', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ sessionId })
                    });
                    const data = await res.json().catch(() => ({}));

                    if (res.ok && data.success) {
                        setStatus('Paiement Réussi !', 'Vos crédits ont été ajoutés à votre wallet.');
                        document.getElementById('home-btn').style.display = 'inline-flex';
                        return;
                    }

                    // Paid not visible yet (Stripe propagation or webhook delay): retry.
                    if (attempt < maxAttempts) {
                        setStatus(
                            'Vérification...',
                            `Veuillez patienter pendant que nous validons votre paiement (tentative ${attempt}/${maxAttempts}).`
                        );
                        await new Promise(r => setTimeout(r, 2000));
                        continue;
                    }

                    setStatus('Paiement non confirmé', data.message || 'Le paiement n\'est pas encore validé.');
                    document.getElementById('home-btn').style.display = 'inline-flex';
                    return;
                } catch (error) {
                    if (attempt < maxAttempts) {
                        await new Promise(r => setTimeout(r, 2000));
                        continue;
                    }
                    setStatus('Erreur', 'Impossible de vérifier le paiement.');
                    document.getElementById('home-btn').style.display = 'inline-flex';
                    return;
                }
            }
        }

        verifyPayment();
    </script>
</body>

</html>
