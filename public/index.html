<!DOCTYPE html>
<html lang="fr" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Wallet</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/css/theme.css">
</head>

<body class="page-home">
    <div class="orb-canvas" aria-hidden="true">
        <div class="orb orb-a"></div>
        <div class="orb orb-b"></div>
        <div class="orb orb-c"></div>
    </div>

    <!-- Top Nav (desktop) -->
    <nav class="top-nav">
        <a href="/" class="brand">Student Wallet</a>
        <div class="nav-links">
            <a href="/" class="active">Carte</a>
            <a href="/shop.html">Shop</a>
            <a href="/events.html">Événements</a>
            <a href="/profile.html">Profil</a>
        </div>
        <div class="flex items-center gap-3">
            <a href="/profile.html" class="btn btn-ghost btn-sm btn-circle">
                <i data-lucide="user" class="w-5 h-5"></i>
            </a>
        </div>
    </nav>

    <div class="app-shell">
        <div class="page-content" style="min-height: 85vh; justify-content: center; align-items: center;">
            <!-- Pending Requests -->
            <div id="homePendingRequests" class="w-full" style="display: none;"></div>

            <!-- Credit Card -->
            <div class="credit-card w-full" id="userCard">
                <div class="card-header">
                    <span>STUDENT WALLET</span>
                    <span class="badge badge-ghost badge-sm" id="userRoleBadge">ETUDIANT</span>
                </div>
                <div class="card-balance">
                    <span class="label">Solde</span>
                    <h1 id="balanceDisplay">---</h1>
                    <span class="currency">CREDITS</span>
                </div>
                <div class="card-footer">
                    <p id="userName" class="text-sm opacity-70">...</p>
                    <div id="qrCode">
                        <button class="btn btn-primary btn-sm gap-2" onclick="openPayModal()">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                            PAYER
                        </button>
                    </div>
                </div>
            </div>

            <!-- Recent Activity -->
            <div class="glass-card w-full">
                <i data-lucide="receipt" class="bg-icon"></i>
                <h3 class="font-semibold text-sm uppercase tracking-wider mb-3 opacity-60">Activité Récente</h3>
                <div id="recentTransactionsList">
                    <div class="skeleton-tx"><div class="skeleton-left"><div class="skeleton-line" style="width:120px"></div><div class="skeleton-line" style="width:80px;height:0.55rem"></div></div><div class="skeleton-right"><div class="skeleton-line skel-h-4 skel-w-full"></div></div></div>
                    <div class="skeleton-tx"><div class="skeleton-left"><div class="skeleton-line" style="width:140px"></div><div class="skeleton-line" style="width:70px;height:0.55rem"></div></div><div class="skeleton-right"><div class="skeleton-line skel-h-4 skel-w-full"></div></div></div>
                    <div class="skeleton-tx"><div class="skeleton-left"><div class="skeleton-line" style="width:100px"></div><div class="skeleton-line" style="width:90px;height:0.55rem"></div></div><div class="skeleton-right"><div class="skeleton-line skel-h-4 skel-w-full"></div></div></div>
                </div>
            </div>
        </div>

        <!-- Bottom Nav -->
        <nav class="bottom-bar">
            <a href="/shop.html">
                <i data-lucide="shopping-bag"></i>
                <span>Shop</span>
            </a>
            <a href="/events.html">
                <i data-lucide="calendar"></i>
                <span>Events</span>
            </a>
            <a href="/" class="active">
                <i data-lucide="credit-card"></i>
                <span>Carte</span>
            </a>
            <a href="/profile.html">
                <i data-lucide="user"></i>
                <span>Profil</span>
            </a>
        </nav>
    </div>

    <!-- Pay Modal -->
    <div id="payModal" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold">Payer le BDE</h2>
                <button class="btn btn-ghost btn-sm btn-circle" onclick="closePayModal()">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="form-control mb-3">
                <label class="label"><span class="label-text text-white">Montant (Crédits)</span></label>
                <input type="number" id="payAmount" placeholder="Ex: 5" min="1"
                    class="input input-bordered w-full bg-white/5 border-white/10">
            </div>
            <div class="form-control mb-4">
                <label class="label"><span class="label-text text-white">Destinataire</span></label>
                <select id="payRecipientGroup" class="select select-bordered w-full bg-white/5 border-white/10">
                    <option value="" disabled selected>Choisir un BDE...</option>
                </select>
            </div>
            <button class="btn btn-primary w-full" onclick="processPayment()">Confirmer</button>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="/js/app.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
