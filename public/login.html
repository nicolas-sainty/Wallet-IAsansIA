<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<script>document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'dark')</script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Wallet - Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/css/theme.css">
</head>

<body class="page-login">
    <div class="orb-canvas" aria-hidden="true">
        <div class="orb orb-a"></div>
        <div class="orb orb-b"></div>
        <div class="orb orb-c"></div>
    </div>

    <nav class="top-nav">
        <a href="/" class="brand">Student Wallet</a>
    </nav>

    <div class="login-container">
        <div class="glass-card">
            <div class="flex justify-center mb-4">
                <img src="/img/logo.svg" alt="Carte Blanche" style="width: 96px; height: auto;">
            </div>
            <h1 class="text-2xl font-bold mb-1 text-center">Carte Blanche</h1>
            <p class="text-sm opacity-50 mb-6 text-center">Gère tes points et tes événements</p>

            <!-- Login -->
            <form id="loginForm">
                <div class="form-control mb-3">
                    <label class="label"><span class="label-text text-white">Email</span></label>
                    <div style="height: 0.5rem;"></div>
                    <input type="email" id="loginEmail" required placeholder="votre@email.fr"
                        class="input input-bordered w-full bg-white/5 border-white/10">
                </div>
                <div class="form-control mb-6">
                    <div style="height: 0.5rem;"></div>
                    <label class="label"><span class="label-text text-white">Mot de passe</span></label>
                    <div class="password-wrapper">
                        <div style="height: 0.5rem;"></div>
                        <input type="password" id="loginPassword" required placeholder="Entrez votre mot de passe"
                            class="input input-bordered w-full bg-white/5 border-white/10">
                        <div style="height: 0.5rem;"></div>
                        <button type="button" class="toggle-password" data-target="loginPassword" aria-label="Afficher le mot de passe">
                            <i data-lucide="eye" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-full">Se Connecter</button>
                <div style="height: 0.5rem;"></div>
                 
                <button type="button" id="showRegisterBtn" class="btn btn-outline w-full mt-3" style="border-color: var(--accent); color: var(--accent);">Enregistrer un BDE</button>
            </form>
            <!-- Register BDE -->
            <form id="registerForm" style="display: none;">
                <div class="form-control mb-3">
                    <label class="label"><span class="label-text text-white">Nom du BDE / École</span></label>
                    <input type="text" id="regBdeName" placeholder="ex: BDE Epitech Paris" required
                        class="input input-bordered w-full bg-white/5 border-white/10">
                </div>
                <div class="form-control mb-3">
                    <label class="label"><span class="label-text text-white">Nom de l'administrateur</span></label>
                    <input type="text" id="regFullName" placeholder="Ton nom" required
                        class="input input-bordered w-full bg-white/5 border-white/10">
                </div>
                <div class="form-control mb-3">
                    <label class="label"><span class="label-text text-white">Email (Contact BDE)</span></label>
                    <input type="email" id="regEmail" placeholder="admin@bde.fr" required
                        class="input input-bordered w-full bg-white/5 border-white/10">
                </div>
                <div class="form-control mb-6">
                    <label class="label"><span class="label-text text-white">Mot de passe</span></label>
                    <div class="password-wrapper">
                        <input type="password" id="regPassword" required minlength="6" placeholder="6 caractères minimum"
                            class="input input-bordered w-full bg-white/5 border-white/10">
                        <button type="button" class="toggle-password" data-target="regPassword" aria-label="Afficher le mot de passe">
                            <i data-lucide="eye" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-full">Créer le BDE</button>
                <button type="button" id="showLoginBtn" class="btn btn-outline w-full mt-3" style="border-color: var(--accent); color: var(--accent);">Retour à la connexion</button>
                <p class="text-[10px] opacity-40 mt-4 text-center">Les comptes étudiants sont créés directement par l'administrateur du BDE.</p>
            </form>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="js/auth.js"></script>
    <script>
        lucide.createIcons();

        const tabs = document.querySelectorAll('.tab');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');

        function switchTab(target) {
            tabs.forEach(tab => {
                tab.classList.toggle('tab-active', tab.dataset.target === target);
            });
            loginForm.style.display = target === 'loginLink' ? 'block' : 'none';
            registerForm.style.display = target === 'registerLink' ? 'block' : 'none';
        }

        tabs.forEach(tab => tab.addEventListener('click', () => switchTab(tab.dataset.target)));

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('tab') === 'register') switchTab('registerLink');

        // Password toggle
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', () => {
                const input = document.getElementById(btn.dataset.target);
                const isHidden = input.type === 'password';
                input.type = isHidden ? 'text' : 'password';
                const icon = btn.querySelector('i');
                icon.setAttribute('data-lucide', isHidden ? 'eye-off' : 'eye');
                lucide.createIcons();
            });
        });
    </script>
</body>

</html>
