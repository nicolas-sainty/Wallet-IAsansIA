<!DOCTYPE html>
<html lang="fr" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Wallet - Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/css/theme.css">
</head>

<body class="page-login">
    <div class="orb-canvas" aria-hidden="true">
        <div class="orb orb-a"></div>
        <div class="orb orb-b"></div>
        <div class="orb orb-c"></div>
    </div>

    <nav class="top-nav">
        <a href="/" class="brand">Student Wallet</a>
    </nav>

    <div class="flex justify-center px-4 pt-16 relative z-1">
        <div class="glass-card w-full max-w-md">
            <h1 class="text-2xl font-bold mb-1">Bienvenue</h1>
            <p class="text-sm opacity-50 mb-6">Connecte-toi pour accéder à tes points</p>

            <!-- Tabs -->
            <div role="tablist" class="tabs tabs-bordered mb-6">
                <button role="tab" class="tab tab-active" data-target="loginLink">Connexion</button>
                <button role="tab" class="tab" data-target="registerLink">Inscription</button>
            </div>

            <!-- Login -->
            <form id="loginForm">
                <div class="form-control mb-3">
                    <label class="label"><span class="label-text text-white">Email</span></label>
                    <input type="email" id="loginEmail" required
                        class="input input-bordered w-full bg-white/5 border-white/10">
                </div>
                <div class="form-control mb-4">
                    <label class="label"><span class="label-text text-white">Mot de passe</span></label>
                    <input type="password" id="loginPassword" required
                        class="input input-bordered w-full bg-white/5 border-white/10">
                </div>
                <button type="submit" class="btn btn-primary w-full">Se Connecter</button>
            </form>

            <!-- Register -->
            <form id="registerForm" style="display: none;">
                <div class="form-control mb-3">
                    <label class="label"><span class="label-text text-white">Nom complet</span></label>
                    <input type="text" id="regName" required
                        class="input input-bordered w-full bg-white/5 border-white/10">
                </div>
                <div class="form-control mb-3">
                    <label class="label"><span class="label-text text-white">Email étudiant</span></label>
                    <input type="email" id="regEmail" required
                        class="input input-bordered w-full bg-white/5 border-white/10">
                </div>
                <div class="form-control mb-3">
                    <label class="label"><span class="label-text text-white">Mot de passe</span></label>
                    <input type="password" id="regPassword" required minlength="6"
                        class="input input-bordered w-full bg-white/5 border-white/10">
                </div>
                <div class="form-control mb-4">
                    <label class="label"><span class="label-text text-white">Type de compte</span></label>
                    <select id="regRole" class="select select-bordered w-full bg-white/5 border-white/10">
                        <option value="student">Étudiant</option>
                        <option value="bde_admin">Membre BDE (Admin)</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary w-full">Créer mon compte</button>
            </form>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="js/auth.js"></script>
    <script>
        lucide.createIcons();

        const tabs = document.querySelectorAll('.tab');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');

        function switchTab(target) {
            tabs.forEach(tab => {
                tab.classList.toggle('tab-active', tab.dataset.target === target);
            });
            loginForm.style.display = target === 'loginLink' ? 'block' : 'none';
            registerForm.style.display = target === 'registerLink' ? 'block' : 'none';
        }

        tabs.forEach(tab => tab.addEventListener('click', () => switchTab(tab.dataset.target)));

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('tab') === 'register') switchTab('registerLink');
    </script>
</body>

</html>
