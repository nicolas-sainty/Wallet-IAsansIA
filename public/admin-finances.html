<!DOCTYPE html>
<html lang="fr" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finances - BDE Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/css/theme.css">
</head>

<body class="page-admin">
    <div class="orb-canvas" aria-hidden="true">
        <div class="orb orb-a"></div>
        <div class="orb orb-b"></div>
        <div class="orb orb-c"></div>
    </div>

    <!-- Top Nav (desktop) -->
    <nav class="top-nav">
        <a href="/admin.html" class="brand">Student Wallet <span class="opacity-50 text-sm">Admin</span></a>
        <div class="nav-links">
            <a href="/admin.html">Dashboard</a>
            <a href="/admin-students.html">Étudiants</a>
            <a href="/admin-events.html">Events</a>
            <a href="/admin-finances.html" class="active">Finances</a>
            <a href="/profile.html">Profil</a>
        </div>
        <div class="flex items-center gap-3">
            <a href="/profile.html" class="btn btn-ghost btn-sm btn-circle">
                <i data-lucide="user" class="w-5 h-5"></i>
            </a>
        </div>
    </nav>

    <div class="app-shell">
        <div class="page-content">
            <!-- Page header -->
            <div class="flex justify-between items-center">
                <div>
                    <h2 class="text-2xl font-bold">Finances</h2>
                    <p class="text-sm opacity-50">Paiements & historique du BDE</p>
                </div>
                <a href="/admin.html" class="btn btn-ghost btn-sm btn-circle">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                </a>
            </div>

            <!-- Payment request form -->
            <div class="glass-card">
                <div class="admin-section-header">
                    <h3><i data-lucide="send" class="w-5 h-5"></i> Demander un paiement</h3>
                </div>
                <div class="admin-form-group">
                    <label>Étudiant destinataire</label>
                    <select id="paymentTargetStudent"
                        class="select select-bordered select-sm w-full bg-white/5 border-white/10"></select>
                    <label>Montant & motif</label>
                    <input type="number" id="paymentAmount" placeholder="Montant"
                        class="input input-bordered input-sm w-full bg-white/5 border-white/10">
                    <input type="text" id="paymentDesc" placeholder="Motif (ex: Pull BDE, Cotisation...)"
                        class="input input-bordered input-sm w-full bg-white/5 border-white/10">
                    <button class="btn btn-primary btn-sm w-full mt-1" onclick="sendPaymentRequest()">
                        <i data-lucide="send" class="w-4 h-4 mr-1"></i> Envoyer la demande
                    </button>
                </div>
            </div>

            <!-- Pending requests -->
            <div class="glass-card">
                <div class="admin-section-header">
                    <h3><i data-lucide="clock" class="w-5 h-5"></i> En attente</h3>
                </div>
                <div id="paymentRequestsList" class="flex flex-col gap-2">
                    <p class="opacity-40 text-sm text-center py-4">Chargement...</p>
                </div>
            </div>

            <!-- Transaction history -->
            <div class="glass-card">
                <div class="admin-section-header">
                    <h3><i data-lucide="history" class="w-5 h-5"></i> Historique BDE</h3>
                </div>
                <div id="transactionsList" class="flex flex-col">
                    <p class="opacity-40 text-sm text-center py-4">Chargement...</p>
                </div>
            </div>
        </div>

        <nav class="bottom-bar">
            <a href="/admin.html">
                <i data-lucide="layout-dashboard"></i>
                <span>Dashboard</span>
            </a>
            <a href="/admin-students.html">
                <i data-lucide="users"></i>
                <span>Étudiants</span>
            </a>
            <a href="/admin-events.html">
                <i data-lucide="calendar"></i>
                <span>Events</span>
            </a>
            <a href="/admin-finances.html" class="active">
                <i data-lucide="wallet"></i>
                <span>Finances</span>
            </a>
            <a href="/profile.html">
                <i data-lucide="user"></i>
                <span>Profil</span>
            </a>
        </nav>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="js/admin.js"></script>
    <script src="js/app.js"></script>
    <script>
        lucide.createIcons();
        document.addEventListener("DOMContentLoaded", () => {
            const checkInit = setInterval(() => {
                if (window.currentBdeId) {
                    clearInterval(checkInit);
                    if (window.loadStudents && document.getElementById('paymentTargetStudent')) {
                        window.loadStudents();
                    }
                }
            }, 500);
            setTimeout(() => clearInterval(checkInit), 10000);
        });
    </script>
</body>

</html>
