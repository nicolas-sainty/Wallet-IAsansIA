<!DOCTYPE html>
<html lang="fr" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finances - BDE Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/css/theme.css">
</head>

<body class="page-admin">
    <div class="orb-canvas" aria-hidden="true">
        <div class="orb orb-a"></div>
        <div class="orb orb-b"></div>
        <div class="orb orb-c"></div>
    </div>

    <!-- Top Nav (desktop) -->
    <nav class="top-nav">
        <a href="/admin.html" class="brand">Student Wallet <span class="opacity-50 text-sm">Admin</span></a>
        <div class="nav-links">
            <a href="/admin.html">Dashboard</a>
            <a href="/admin-students.html">Étudiants</a>
            <a href="/admin-events.html">Events</a>
            <a href="/admin-finances.html" class="active">Finances</a>
            <a href="/profile.html">Profil</a>
        </div>
        <div class="flex items-center gap-3">
            <a href="/profile.html" class="btn btn-ghost btn-sm btn-circle">
                <i data-lucide="user" class="w-5 h-5"></i>
            </a>
        </div>
    </nav>

    <div class="app-shell">
        <div class="page-content">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">Finances</h2>
                <a href="/admin.html" class="btn btn-ghost btn-sm">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                    Dashboard
                </a>
            </div>

            <div class="glass-card mb-4">
                <h3 class="font-semibold mb-3 flex items-center gap-2">
                    <i data-lucide="send" class="w-5 h-5"></i>
                    Demander Paiement
                </h3>
                <div class="flex flex-col gap-2">
                    <select id="paymentTargetStudent"
                        class="select select-bordered select-sm w-full bg-white/5 border-white/10"></select>
                    <div class="flex gap-2">
                        <input type="number" id="paymentAmount" placeholder="Montant"
                            class="input input-bordered input-sm flex-1 bg-white/5 border-white/10">
                        <button class="btn btn-primary btn-sm" onclick="sendPaymentRequest()">Envoyer</button>
                    </div>
                    <input type="text" id="paymentDesc" placeholder="Motif (ex: Pull BDE)"
                        class="input input-bordered input-sm w-full bg-white/5 border-white/10">
                </div>

                <div class="divider my-3 opacity-20"></div>

                <h4 class="font-semibold text-sm mb-2 flex items-center gap-2">
                    <i data-lucide="clock" class="w-4 h-4"></i>
                    En attente
                </h4>
                <div id="paymentRequestsList"></div>
            </div>

            <div class="glass-card">
                <h3 class="font-semibold mb-3 flex items-center gap-2">
                    <i data-lucide="history" class="w-5 h-5"></i>
                    Historique BDE
                </h3>
                <div id="transactionsList"></div>
            </div>
        </div>

        <nav class="bottom-bar">
            <a href="/admin.html">
                <i data-lucide="layout-dashboard"></i>
                <span>Dashboard</span>
            </a>
            <a href="/admin-students.html">
                <i data-lucide="users"></i>
                <span>Étudiants</span>
            </a>
            <a href="/admin-events.html">
                <i data-lucide="calendar"></i>
                <span>Events</span>
            </a>
            <a href="/admin-finances.html" class="active">
                <i data-lucide="wallet"></i>
                <span>Finances</span>
            </a>
            <a href="/profile.html">
                <i data-lucide="user"></i>
                <span>Profil</span>
            </a>
        </nav>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="js/admin.js"></script>
    <script src="js/app.js"></script>
    <script>
        lucide.createIcons();
        document.addEventListener("DOMContentLoaded", () => {
            const checkInit = setInterval(() => {
                if (window.currentBdeId) {
                    clearInterval(checkInit);
                    if (window.loadStudents && document.getElementById('paymentTargetStudent')) {
                        window.loadStudents();
                    }
                }
            }, 500);
            setTimeout(() => clearInterval(checkInit), 10000);
        });
    </script>
</body>

</html>
