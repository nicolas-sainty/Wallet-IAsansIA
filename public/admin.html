<!DOCTYPE html>
<html lang="fr" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDE Admin Dashboard - Student Wallet</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/css/theme.css">
</head>

<body class="page-admin">
    <div class="orb-canvas" aria-hidden="true">
        <div class="orb orb-a"></div>
        <div class="orb orb-b"></div>
        <div class="orb orb-c"></div>
    </div>

    <div class="app-shell">
        <div class="page-content">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">Dashboard BDE</h2>
                <a href="/" class="btn btn-ghost btn-sm">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                    Retour
                </a>
            </div>

            <!-- Stats -->
            <div class="glass-card mb-4">
                <h3 class="font-semibold mb-3 flex items-center gap-2">
                    <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
                    Vue d'ensemble
                </h3>
                <div class="grid grid-cols-2 gap-2">
                    <div class="stat-box">
                        <div class="stat-val" id="statMembers">--</div>
                        <div class="stat-lbl">Membres</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-val" id="statBalance">-- €</div>
                        <div class="stat-lbl">Wallet EUR</div>
                    </div>
                    <div class="stat-box col-span-2">
                        <div class="stat-val" id="statVolume">--</div>
                        <div class="stat-lbl">Volume (Credits)</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Nav -->
        <nav class="bottom-bar">
            <a href="/admin.html" class="active">
                <i data-lucide="layout-dashboard"></i>
                <span>Dashboard</span>
            </a>
            <a href="/admin-students.html">
                <i data-lucide="users"></i>
                <span>Étudiants</span>
            </a>
            <a href="/admin-events.html">
                <i data-lucide="calendar"></i>
                <span>Events</span>
            </a>
            <a href="/admin-finances.html">
                <i data-lucide="wallet"></i>
                <span>Finances</span>
            </a>
            <a href="/profile.html">
                <i data-lucide="user"></i>
                <span>Profil</span>
            </a>
        </nav>
    </div>

    <!-- Participants Modal -->
    <div id="participantsModal" class="modal-overlay hidden">
        <div class="modal-box">
            <h3 class="font-bold text-lg mb-3">Participations</h3>
            <div id="participantsListCtx" style="max-height: 300px; overflow-y: auto;"></div>
            <button class="btn btn-ghost w-full mt-3"
                onclick="document.getElementById('participantsModal').classList.add('hidden')">Fermer</button>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="js/admin.js"></script>
    <script src="js/app.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
