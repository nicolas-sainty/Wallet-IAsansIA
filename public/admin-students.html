<!DOCTYPE html>
<html lang="fr" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etudiants - BDE Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/css/theme.css">
</head>

<body class="page-admin">
    <div class="orb-canvas" aria-hidden="true">
        <div class="orb orb-a"></div>
        <div class="orb orb-b"></div>
        <div class="orb orb-c"></div>
    </div>

    <!-- Top Nav (desktop) -->
    <nav class="top-nav">
        <a href="/admin.html" class="brand">Student Wallet <span class="opacity-50 text-sm">Admin</span></a>
        <div class="nav-links">
            <a href="/admin.html">Dashboard</a>
            <a href="/admin-students.html" class="active">Étudiants</a>
            <a href="/admin-events.html">Events</a>
            <a href="/admin-finances.html">Finances</a>
            <a href="/profile.html">Profil</a>
        </div>
        <div class="flex items-center gap-3">
            <a href="/profile.html" class="btn btn-ghost btn-sm btn-circle">
                <i data-lucide="user" class="w-5 h-5"></i>
            </a>
        </div>
    </nav>

    <div class="app-shell">
        <div class="page-content">
            <!-- Page header -->
            <div class="flex justify-between items-center">
                <div>
                    <h2 class="text-2xl font-bold">Étudiants</h2>
                    <p class="text-sm opacity-50">Gestion des membres du BDE</p>
                </div>
                <a href="/admin.html" class="btn btn-ghost btn-sm btn-circle">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                </a>
            </div>

            <!-- Add student form -->
            <div class="glass-card">
                <div class="admin-section-header">
                    <h3><i data-lucide="user-plus" class="w-5 h-5"></i> Créer un accès étudiant</h3>
                </div>
                <div class="admin-form-group">
                    <label>Informations de l'étudiant</label>
                    <input type="text" id="newStudentName" placeholder="Nom complet"
                        class="input input-bordered input-sm w-full bg-white/5 border-white/10">
                    <div class="input-row">
                        <input type="email" id="newStudentEmail" placeholder="Adresse email"
                            class="input input-bordered input-sm flex-1 bg-white/5 border-white/10">
                    </div>
                    <div class="input-row">
                        <input type="password" id="newStudentPassword" placeholder="Mot de passe provisoire"
                            class="input input-bordered input-sm flex-1 bg-white/5 border-white/10">
                        <button id="addStudentBtn" class="btn btn-primary btn-sm px-5">
                            <i data-lucide="plus" class="w-4 h-4 mr-1"></i> Créer
                        </button>
                    </div>
                </div>
            </div>

            <!-- Students list -->
            <div class="glass-card">
                <div class="admin-section-header">
                    <h3><i data-lucide="users" class="w-5 h-5"></i> Liste des membres</h3>
                </div>
                <div id="studentsList" class="flex flex-col gap-2">
                    <p class="opacity-40 text-sm text-center py-4">Chargement...</p>
                </div>
            </div>
        </div>

        <nav class="bottom-bar">
            <a href="/admin.html">
                <i data-lucide="layout-dashboard"></i>
                <span>Dashboard</span>
            </a>
            <a href="/admin-students.html" class="active">
                <i data-lucide="users"></i>
                <span>Étudiants</span>
            </a>
            <a href="/admin-events.html">
                <i data-lucide="calendar"></i>
                <span>Events</span>
            </a>
            <a href="/admin-finances.html">
                <i data-lucide="wallet"></i>
                <span>Finances</span>
            </a>
            <a href="/profile.html">
                <i data-lucide="user"></i>
                <span>Profil</span>
            </a>
        </nav>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="js/admin.js"></script>
    <script src="js/app.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
