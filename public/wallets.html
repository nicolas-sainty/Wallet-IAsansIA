<!DOCTYPE html>
<html lang="fr" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Wallet - Mon Compte</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/css/theme.css">
</head>

<body class="page-wallets">
    <div class="orb-canvas" aria-hidden="true">
        <div class="orb orb-a"></div>
        <div class="orb orb-b"></div>
        <div class="orb orb-c"></div>
    </div>

    <!-- Top Nav -->
    <nav class="top-nav">
        <a href="/" class="brand">Student Wallet</a>
        <div class="nav-links">
            <a href="/">Carte</a>
            <a href="/shop.html">Shop</a>
            <a href="/events.html">Événements</a>
            <a href="/wallets.html" class="active">Mon Compte</a>
            <a href="/groups.html">Assos & BDE</a>
        </div>
        <div class="flex items-center gap-3">
            <a href="/login.html?tab=register" class="btn btn-primary btn-sm gap-1">
                <i data-lucide="plus" class="w-4 h-4"></i>
                Rejoindre
            </a>
        </div>
    </nav>

    <div class="app-shell wide">
        <div class="page-content">
            <!-- Wallets Section -->
            <section>
                <div class="flex justify-between items-center mb-4">
                    <h2 class="section-title">Mes Points</h2>
                    <a href="/login.html?tab=register" class="btn btn-primary btn-sm gap-1">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                        Créer Compte
                    </a>
                </div>
                <div id="walletsList" class="grid-cards"></div>
            </section>

            <!-- Transactions Section -->
            <section>
                <h2 class="section-title">Historique des Activités</h2>
                <div id="transactionsList" class="glass-card"></div>
            </section>
        </div>
    </div>

    <!-- Mobile Bottom Nav -->
    <nav class="bottom-bar">
        <a href="/">
            <i data-lucide="home"></i>
            <span>Accueil</span>
        </a>
        <a href="/wallets.html" class="active">
            <i data-lucide="credit-card"></i>
            <span>Compte</span>
        </a>
        <a href="/events.html">
            <i data-lucide="calendar"></i>
            <span>Events</span>
        </a>
        <a href="/groups.html">
            <i data-lucide="users"></i>
            <span>Assos</span>
        </a>
    </nav>

    <div id="toastContainer" class="toast-container"></div>
    <script src="/js/app.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
