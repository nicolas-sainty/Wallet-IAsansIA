<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" fill="none">
  <!-- Shadow -->
  <rect x="22" y="52" rx="22" ry="22" width="156" height="100" fill="#e0dfe4" opacity="0.5"/>
  <!-- Card body -->
  <rect x="18" y="42" rx="22" ry="22" width="156" height="100" fill="#f5f3f7"/>
  <!-- Left eye (half circle, winking) -->
  <path d="M62 92 C62 80, 78 80, 78 92" stroke="#2b2d6e" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- Left cheek -->
  <ellipse cx="64" cy="102" rx="6" ry="4.5" fill="#e8732a"/>
  <!-- Smile -->
  <path d="M88 95 C88 82, 106 82, 106 95" stroke="#2b2d6e" stroke-width="5.5" stroke-linecap="round" fill="none"/>
  <!-- Right eye (big circle) -->
  <circle cx="122" cy="88" r="16" fill="#2b2d6e"/>
  <circle cx="118" cy="84" r="5" fill="white"/>
  <circle cx="126" cy="90" r="3" fill="white"/>
  <!-- Right cheek -->
  <ellipse cx="118" cy="106" rx="6" ry="4.5" fill="#e8732a"/>
  <!-- Wallet clasp / toggle -->
  <rect x="148" y="76" rx="12" ry="12" width="38" height="24" fill="white"/>
  <rect x="150" y="78" rx="11" ry="11" width="34" height="20" fill="#e8732a"/>
  <circle cx="174" cy="88" r="7" fill="white"/>
</svg>
