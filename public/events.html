<!DOCTYPE html>
<html lang="fr" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - Student Wallet</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/css/theme.css">
</head>

<body class="page-events">
    <div class="orb-canvas" aria-hidden="true">
        <div class="orb orb-a"></div>
        <div class="orb orb-b"></div>
        <div class="orb orb-c"></div>
    </div>

    <!-- Top Nav (desktop) -->
    <nav class="top-nav">
        <a href="/" class="brand">Student Wallet</a>
        <div class="nav-links">
            <a href="/">Carte</a>
            <a href="/shop.html">Shop</a>
            <a href="/events.html" class="active">Événements</a>
            <a href="/profile.html">Profil</a>
        </div>
        <div class="flex items-center gap-3">
            <a href="/profile.html" class="btn btn-ghost btn-sm btn-circle">
                <i data-lucide="user" class="w-5 h-5"></i>
            </a>
        </div>
    </nav>

    <div class="app-shell">
        <div class="page-content">
            <div class="flex justify-between items-center mb-2">
                <h1 class="text-2xl font-bold">Événements</h1>
                <button class="btn btn-primary btn-sm gap-1" id="createEventBtn" style="display: none;">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                    Créer
                </button>
            </div>

            <div id="eventsGrid" class="grid-cards">
                <div class="skeleton-event"><div class="skeleton-banner"></div><div class="skeleton-body"><div class="skeleton-line skel-w-33"></div><div class="skeleton-line skel-h-6 skel-w-75"></div><div class="skeleton-line skel-w-full"></div><div class="skeleton-line skel-w-66"></div></div></div>
                <div class="skeleton-event"><div class="skeleton-banner"></div><div class="skeleton-body"><div class="skeleton-line skel-w-33"></div><div class="skeleton-line skel-h-6 skel-w-75"></div><div class="skeleton-line skel-w-full"></div><div class="skeleton-line skel-w-66"></div></div></div>
                <div class="skeleton-event"><div class="skeleton-banner"></div><div class="skeleton-body"><div class="skeleton-line skel-w-33"></div><div class="skeleton-line skel-h-6 skel-w-75"></div><div class="skeleton-line skel-w-full"></div><div class="skeleton-line skel-w-66"></div></div></div>
            </div>
        </div>

        <div id="toastContainer" class="toast-container"></div>

        <!-- Bottom Nav -->
        <nav class="bottom-bar">
            <a href="/shop.html">
                <i data-lucide="shopping-bag"></i>
                <span>Shop</span>
            </a>
            <a href="/events.html" class="active">
                <i data-lucide="calendar"></i>
                <span>Events</span>
            </a>
            <a href="/">
                <i data-lucide="credit-card"></i>
                <span>Carte</span>
            </a>
            <a href="/profile.html">
                <i data-lucide="user"></i>
                <span>Profil</span>
            </a>
        </nav>
    </div>

    <script src="/js/app.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
